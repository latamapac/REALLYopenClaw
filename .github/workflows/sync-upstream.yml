name: Sync Upstream OpenClaw

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream

      - name: Merge upstream into default branch
        id: merge
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git checkout "$DEFAULT_BRANCH"
          AHEAD_COUNT=$(git rev-list --count "HEAD..upstream/main")
          echo "ahead_count=$AHEAD_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge --no-edit upstream/main; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged changes
        if: steps.merge.outputs.merged == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Open conflict issue
        if: steps.merge.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Upstream sync conflict: manual merge required";
            const body = [
              "Automatic upstream sync failed due to merge conflicts.",
              "",
              "Run manually:",
              "```bash",
              "git fetch upstream",
              "git checkout main",
              "git merge upstream/main",
              "```",
              "",
              "Keep the fork-specific gateway-lock behavior if conflicts touch it."
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "upstream-sync"
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["upstream-sync", "maintenance"]
              });
            }

